name: Release

# Triggers on annotated tags `vX.Y.Z`. Builds, tests, then publishes to npm
# and creates a GitHub Release. The npm version on the published package
# must match `package.json#version`; the workflow asserts this before publish.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # to create GitHub Releases
  id-token: write   # for npm provenance

jobs:
  release:
    name: Build, Test, Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and package.json agree on $PKG_VERSION"

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See `CHANGELOG.md` for the curated, human-written notes.

            Auto-generated commit log follows.
